name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild \
            -project cooViewer.xcodeproj \
            -scheme cooViewer_deploy \
            -configuration Deployment \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=11.0 \
            build

      - name: Verify arm64 binaries
        run: |
          set -euo pipefail
          APP="build/Deployment/cooViewer.app"
          lipo -info "$APP/Contents/MacOS/cooViewer" | grep -q "arm64"
          lipo -info "$APP/Contents/Frameworks/XADMaster.framework/Versions/A/XADMaster" | grep -q "arm64"
          lipo -info "$APP/Contents/Frameworks/UniversalDetector.framework/Versions/A/UniversalDetector" | grep -q "arm64"
          otool -L "$APP/Contents/MacOS/cooViewer"
          otool -l "$APP/Contents/MacOS/cooViewer" | grep -A2 LC_RPATH | grep -q "@executable_path/../Frameworks"

      - name: Ad-hoc sign app bundle
        run: |
          set -euo pipefail
          APP="build/Deployment/cooViewer.app"
          codesign --force --sign - --timestamp=none "$APP/Contents/Frameworks/XADMaster.framework"
          codesign --force --sign - --timestamp=none "$APP/Contents/Frameworks/UniversalDetector.framework"
          codesign --force --deep --sign - --timestamp=none "$APP"
          codesign --verify --deep --strict --verbose=4 "$APP"

      - name: Package
        run: |
          set -euo pipefail
          PACKAGE_DIR="dist/cooViewer-${GITHUB_REF_NAME}-macos-arm64"
          rm -rf dist
          mkdir -p "$PACKAGE_DIR/licenses"
          cp -R "build/Deployment/cooViewer.app" "$PACKAGE_DIR/"
          cp README.md Licence.txt Licence_xad.txt Licence_RemoteControlWrapper.txt THIRD_PARTY_NOTICES.md "$PACKAGE_DIR/"
          cp XADMaster/LICENSE "$PACKAGE_DIR/licenses/XADMaster-LICENSE.txt"
          cp UniversalDetector/LICENSE "$PACKAGE_DIR/licenses/UniversalDetector-LICENSE.txt"
          ditto -c -k --sequesterRsrc --keepParent "$PACKAGE_DIR" "cooViewer-${GITHUB_REF_NAME}-macos-arm64.zip"

      - name: Verify packaged app
        run: |
          set -euo pipefail
          ZIP="cooViewer-${GITHUB_REF_NAME}-macos-arm64.zip"
          VERIFY_DIR="dist/verify"
          rm -rf "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"
          ditto -x -k "$ZIP" "$VERIFY_DIR"
          APP="$VERIFY_DIR/cooViewer-${GITHUB_REF_NAME}-macos-arm64/cooViewer.app"
          test -x "$APP/Contents/MacOS/cooViewer"
          test -x "$APP/Contents/Frameworks/XADMaster.framework/Versions/A/XADMaster"
          test -x "$APP/Contents/Frameworks/UniversalDetector.framework/Versions/A/UniversalDetector"
          lipo -info "$APP/Contents/MacOS/cooViewer" | grep -q "arm64"
          otool -l "$APP/Contents/MacOS/cooViewer" | grep -A2 LC_RPATH | grep -q "@executable_path/../Frameworks"
          otool -L "$APP/Contents/MacOS/cooViewer" | grep -q "@rpath/XADMaster.framework/Versions/A/XADMaster"
          otool -L "$APP/Contents/MacOS/cooViewer" | grep -q "@rpath/UniversalDetector.framework/Versions/A/UniversalDetector"
          codesign --verify --deep --strict --verbose=4 "$APP"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "cooViewer-${GITHUB_REF_NAME}-macos-arm64.zip" \
            --title "cooViewer ${GITHUB_REF_NAME}" \
            --generate-notes
